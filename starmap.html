<!DOCTYPE html>
<html>
    <head>
    <title>CONSTELLATIONS OF THE NORTHERN NIGHT SKY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <link rel="stylesheet" href="style.css">
    </head>

    <body>
      <!-- hyg-v42 stars -->
      <canvas id="background"></canvas> 

      <div id="main">
        <div id="map-container">
          <div id="spin-wrapper"></div>
        </div>
      </div>
      
      <div id="description">
          <h1 id="title-name">THE NORTHERN SKY</h1>
          <p id="info">Click a constellation on the map to explore</p>
      </div>

      <div id="settings">
          <i id=map-button class="fa-solid fa-n" title="Switch Maps"></i>
          <i id="play-button" class="fa-solid fa-pause" title="Playback"></i>
          <i id="label-button" class="fa-solid fa-tag" title="Toggle Labels"></i>
          <i id="github-button" class="fa-brands fa-github" title="Github" onclick="window.open('https://github.com/jingqty/KonekTala', '_blank')"></i>
      </div>
      <!-- main js -->
      <script src="script.js"></script>
    </body>
</html>
